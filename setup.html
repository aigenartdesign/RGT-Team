<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <meta name="cache-control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="pragma" content="no-cache">
    <meta http-equiv="expires" content="0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Stundenzettel Setup">
    <title>Stundenzettel – Setup</title>
    <style>
        :root {
            --primary: #4f9ff0;
            --primary-dark: #357abd;
            --txt: #1a1a1a;
            --sub: #666;
            --bg: #f5f7fb;
            --card: #ffffff;
            --border: #e8eef5;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fb 0%, #e8f0ff 100%);
            color: var(--txt);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: var(--card);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 40px rgba(79, 159, 240, 0.15);
            max-width: 500px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        
        .title {
            font-size: 28px;
            font-weight: 900;
            color: var(--txt);
            margin-bottom: 8px;
        }
        
        .subtitle {
            font-size: 14px;
            color: var(--sub);
        }
        
        .step {
            margin-bottom: 32px;
        }
        
        .step-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        .form-group {
            background: var(--bg);
            padding: 16px;
            border-radius: 14px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="time"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'Poppins', inherit;
            font-size: 14px;
            color: var(--txt);
            background: white;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 159, 240, 0.1);
        }
        
        .day-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            align-items: end;
            margin-bottom: 12px;
            background: white;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        
        .day-row input {
            margin: 0;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px;
            background: white;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        
        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .checkbox-label {
            font-size: 14px;
            color: var(--txt);
            cursor: pointer;
            flex: 1;
        }
        
        .button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
        }
        
        .btn-primary:active {
            transform: scale(0.98);
        }
        
        .step-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--txt);
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">📋</div>
            <div class="title">Stundenzettel</div>
            <div class="subtitle">Schnelle Einrichtung</div>
        </div>

        <!-- SCHRITT 1 -->
        <div class="step">
            <div class="step-label">Schritt 1 von 2</div>
            <div class="step-title">Deine Angaben</div>
            
            <div class="form-group">
                <label class="form-label">Name</label>
                <input type="text" id="nameInput" placeholder="z.B. Renate Brückers" value="">
            </div>
            
            <div class="form-group">
                <label class="form-label">Wochenstunden</label>
                <input type="number" id="hoursInput" placeholder="z.B. 31" value="31" min="0" step="0.5">
            </div>
        </div>

        <!-- SCHRITT 2 -->
        <div class="step">
            <div class="step-label">Schritt 2 von 2</div>
            <div class="step-title">Dein Stundenplan (Mo–Fr)</div>
            
            <div id="scheduleContainer">
                <!-- Wird mit JS gefüllt -->
            </div>
        </div>

        <!-- BUTTON -->
        <button class="button btn-primary" onclick="saveSetup()">Speichern & Fertig ✓</button>
    </div>

    <script>
        const DAYS = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag'];
        
        const DEFAULTS = {
            'Montag': { von: '08:00', bis: '15:00' },
            'Dienstag': { von: '08:00', bis: '15:00' },
            'Mittwoch': { von: '08:00', bis: '15:00' },
            'Donnerstag': { von: '08:00', bis: '15:00' },
            'Freitag': { von: '08:00', bis: '15:00' }
        };
        
        function init() {
            const currentUser = localStorage.getItem('last_stundenzettel_user');
            if (currentUser) {
                const lastData = JSON.parse(localStorage.getItem(`stundenzettel_${currentUser}`));
                if (lastData) {
                    document.getElementById('nameInput').value = lastData.name.replace(/_/g, ' ');
                    document.getElementById('hoursInput').value = lastData.wochenstunden;
                }
            }
            
            renderSchedule();
        }
        
        function renderSchedule() {
            const html = DAYS.map(day => {
                const defaults = DEFAULTS[day];
                return `
                    <div class="form-group">
                        <label class="form-label">${day}</label>
                        <div class="day-row">
                            <input type="time" id="von-${day}" value="${defaults.von}" required>
                            <span style="text-align: center; color: var(--sub);">–</span>
                            <input type="time" id="bis-${day}" value="${defaults.bis}" required>
                        </div>
                        <div class="checkbox-group">
                            <input type="checkbox" id="team-${day}">
                            <label class="checkbox-label" for="team-${day}">Team-Besprechung (+1h)</label>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('scheduleContainer').innerHTML = html;
        }
        
        function saveSetup() {
            const name = document.getElementById('nameInput').value.trim();
            if (!name) {
                alert('Bitte gib deinen Namen ein!');
                return;
            }
            
            const wochenstunden = parseFloat(document.getElementById('hoursInput').value) || 31;
            
            const schedule = DAYS.map(day => ({
                day: day,
                von: document.getElementById(`von-${day}`).value,
                bis: document.getElementById(`bis-${day}`).value,
                team: document.getElementById(`team-${day}`).checked
            }));
            
            const userData = {
                name: name.replace(/\s+/g, '_').toUpperCase(),
                wochenstunden: wochenstunden,
                schedule: schedule,
                eintraege: {},
                erstellt: new Date().toISOString()
            };
            
            const key = `stundenzettel_${userData.name}`;
            localStorage.setItem(key, JSON.stringify(userData));
            
            // WICHTIG: Speichere den aktuellen Benutzer
            localStorage.setItem('last_stundenzettel_user', userData.name);
            
            alert('✓ Gespeichert!');
            window.location.href = 'worker.html';
        }
        
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
